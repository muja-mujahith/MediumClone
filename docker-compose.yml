version: "3.8"

services:
  app:
    build: .
    container_name: LogFile
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: LogFile
    restart: always
    environment:
      MYSQL_DATABASE: LogFile
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: